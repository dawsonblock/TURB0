[flake8]
max-line-length = 88
extend-ignore = E501
exclude =
    .git,
    __pycache__,
    .mypy_cache,
    .nox,
    .pytest_cache,
    .ruff_cache,
    .venv,
    build,
    dist,
    mlx_lm

[pycodestyle]
max-line-length = 88
ignore = E501
exclude =
    .git,
    __pycache__,
    .mypy_cache,
    .nox,
    .pytest_cache,
    .ruff_cache,
    .venv,
    build,
    dist,
    mlx_lm