# Apple-Silicon runtime certification.
#
# Structural tier:
#   - Runs on GitHub-hosted macOS to avoid blocking PR signal on a self-hosted box.
#   - No model weights required.
#
# Full certification tier:
#   - Runs only on a self-hosted Apple Silicon runner.
#   - Requires both model secrets.
#   - Fails closed unless scripts/certify_apple_runtime.sh writes a PASS
#     cert_manifest.json matching the repo contract and required artifacts.

name: apple-runtime-cert

on:
  push:
    branches: [main]
    paths:
      - 'turboquant/**'
      - 'mlx_lm/**'
      - 'tests/integration_mlx/**'
      - 'benchmarks/runtime_cert/**'
      - 'scripts/certify_apple_runtime.sh'
      - '.github/workflows/apple-runtime-cert.yml'
      - 'turboquant/contract.json'
      - 'pyproject.toml'
  pull_request:
    paths:
      - 'turboquant/**'
      - 'mlx_lm/**'
      - 'tests/integration_mlx/**'
      - 'benchmarks/runtime_cert/**'
      - 'scripts/certify_apple_runtime.sh'
      - '.github/workflows/apple-runtime-cert.yml'
      - 'turboquant/contract.json'
      - 'pyproject.toml'
  workflow_dispatch:
    inputs:
      run_model_stages:
        description: 'Run model-weight stages (requires secrets)'
        type: boolean
        default: false

concurrency:
  group: apple-cert-${{ github.ref }}
  cancel-in-progress: true

jobs:
  structural:
    name: Structural Tests (no weights)
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[apple,test]'

      - name: Verify MLX version bounds
        run: |
          python -c "
          from turboquant._deps import check_mlx_version
          check_mlx_version()
          print('MLX version check passed')
          "

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Run structural integration tests
        run: |
          python -m pytest tests/integration_mlx/ \
            -v --tb=short \
            -k "not llama and not gemma" \
            --junitxml=artifacts/junit_structural.xml

      - name: Upload structural artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: structural-test-results
          path: artifacts/junit_structural.xml
          if-no-files-found: error

  full-certification:
    name: Full Runtime Certification
    needs: structural
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_model_stages)
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 60
    env:
      TQ_TEST_LLAMA_MODEL: ${{ secrets.TQ_TEST_LLAMA_MODEL }}
      TQ_TEST_GEMMA_MODEL: ${{ secrets.TQ_TEST_GEMMA_MODEL }}

    steps:
      - uses: actions/checkout@v4

      - name: Select Apple runner Python
        shell: bash
        run: |
          set -euo pipefail
          python_bin="$(command -v python3.11 || command -v python3.10 || command -v python3.9 || true)"
          if [ -z "$python_bin" ]; then
            echo "Self-hosted Apple runner requires python3.11, python3.10, or python3.9 on PATH."
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/bin"
          ln -sf "$python_bin" "$RUNNER_TEMP/bin/python"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          python --version

      - name: Install package
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e '.[apple,test]'

      - name: Prepare artifact directories
        shell: bash
        run: |
          set -euo pipefail
          rm -rf artifacts/runtime-cert
          mkdir -p artifacts/runtime-cert artifacts

      - name: Require both release model secrets
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${TQ_TEST_LLAMA_MODEL:-}" ] || [ -z "${TQ_TEST_GEMMA_MODEL:-}" ]; then
            echo "Full certification requires both TQ_TEST_LLAMA_MODEL and TQ_TEST_GEMMA_MODEL."
            exit 1
          fi

      - name: Run full certification
        id: cert
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          export VIRTUAL_ENV="$RUNNER_TEMP/dummy-venv"
          bash scripts/certify_apple_runtime.sh

      - name: Locate certification artifact directory
        id: locate_artifacts
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          from pathlib import Path

          root = Path("artifacts/runtime-cert")
          artifact_dirs = sorted(path for path in root.glob("*") if path.is_dir())
          if not artifact_dirs:
              raise SystemExit("No certification artifact directory found under artifacts/runtime-cert/.")
          latest = artifact_dirs[-1]
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"artifact_dir={latest.as_posix()}\n")
          print(f"Found certification artifact directory: {latest}")
          PY

      - name: Upload certification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-cert-${{ github.sha }}
          path: ${{ steps.locate_artifacts.outputs.artifact_dir }}
          retention-days: 90
          if-no-files-found: error

      - name: Validate certification manifest
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          repo_contract_path = Path("turboquant/contract.json")
          repo_contract = json.loads(repo_contract_path.read_text(encoding="utf-8"))

          manifests = sorted(Path("artifacts/runtime-cert").glob("*/cert_manifest.json"))
          if len(manifests) != 1:
              raise SystemExit(
                  "expected exactly one cert_manifest.json under artifacts/runtime-cert/, "
                  f"found {len(manifests)}"
              )

          contracts = sorted(Path("artifacts/runtime-cert").glob("*/contract.json"))
          if len(contracts) != 1:
              raise SystemExit(
                  "expected exactly one contract.json under artifacts/runtime-cert/, "
                  f"found {len(contracts)}"
              )

          manifest_path = manifests[0]
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          contract_path = contracts[0]
          contract = json.loads(contract_path.read_text(encoding="utf-8"))
          artifact_dir = Path(manifest["artifact_dir"])

          if manifest.get("result") != "PASS":
              raise SystemExit(
                  f"certification manifest result must be PASS, got {manifest.get('result')!r}"
              )
          if manifest.get("platform") != "darwin-arm64":
              raise SystemExit(
                  f"certification manifest platform must be darwin-arm64, got {manifest.get('platform')!r}"
              )

          families = set(manifest.get("certification_scope", {}).get("families", []))
          if families != {"llama", "gemma"}:
              raise SystemExit(
                  "full certification manifest must include both 'llama' and 'gemma' in scope, "
                  f"got {sorted(families)!r}"
              )

          if contract != repo_contract:
              raise SystemExit(
                  f"artifact contract {contract_path} does not match repo contract {repo_contract_path}"
              )

          missing = [
              name
              for name in repo_contract["canonical_runtime"]["required_release_artifacts"]
              if not (artifact_dir / name).exists()
          ]
          if missing:
              raise SystemExit(
                  "full certification artifact directory is missing required files: "
                  + ", ".join(missing)
              )

          print(f"Validated certification manifest: {manifest_path}")
          print(f"Validated contract snapshot: {contract_path}")
          PY

      - name: Model smoke tests
        if: env.TQ_TEST_LLAMA_MODEL != '' && env.TQ_TEST_GEMMA_MODEL != ''
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest tests/integration_mlx/ \
            -v --tb=short \
            --junitxml=artifacts/junit_model_smoke.xml

      - name: Upload model smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-smoke-results
          path: artifacts/junit_model_smoke.xml
          if-no-files-found: ignore

      - name: Fail if certification step failed
        if: always() && steps.cert.outcome != 'success'
        shell: bash
        run: |
          echo "Full certification script failed. Check the runtime-cert artifact for details if it was uploaded successfully; otherwise review the certification and artifact-upload step logs."
          exit 1
