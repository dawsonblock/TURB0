name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  verify-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build and test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
          python -m pip install build twine

      - name: Source-checkout preflight
        run: python scripts/preflight.py

      - name: Compileall
        run: python -m compileall turboquant mlx_lm tests

      - name: Static tests
        run: python -m pytest tests/unit_static -q

      - name: Build artifacts
        run: python -m build

      - name: Check distributions
        run: twine check dist/*

      - name: Verify distribution boundary
        run: python tools/verify_dist_contents.py

      - name: Upload verified distributions
        uses: actions/upload-artifact@v4
        with:
          name: turboquant-dist
          path: dist/*

  verify-vendored-surface:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Audit vendored mlx_lm surface
        run: python tools/audit_vendored_surface.py

  certify-apple-runtime:
    needs: [verify-static, verify-vendored-surface]
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 60
    env:
      TQ_TEST_LLAMA_MODEL: ${{ secrets.TQ_TEST_LLAMA_MODEL }}
      TQ_TEST_GEMMA_MODEL: ${{ secrets.TQ_TEST_GEMMA_MODEL }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Apple runner Python
        run: |
          python_bin="$(command -v python3.11 || command -v python3.10 || command -v python3.9)"
          if [ -z "$python_bin" ]; then
            echo "Self-hosted Apple runner requires python3.11, python3.10, or python3.9 on PATH."
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/bin"
          ln -sf "$python_bin" "$RUNNER_TEMP/bin/python"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          python --version

      - name: Install Apple runtime deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[apple,test]'

      - name: Clear stale certification artifacts
        run: |
          rm -rf artifacts/runtime-cert
          mkdir -p artifacts/runtime-cert

      - name: Require both release model secrets
        run: |
          if [ -z "${TQ_TEST_LLAMA_MODEL:-}" ] || [ -z "${TQ_TEST_GEMMA_MODEL:-}" ]; then
            echo "Release certification requires both TQ_TEST_LLAMA_MODEL and TQ_TEST_GEMMA_MODEL."
            exit 1
          fi

      - name: Run Apple runtime certification
        id: cert
        continue-on-error: true
        run: |
          export VIRTUAL_ENV="$RUNNER_TEMP/dummy-venv"
          bash scripts/certify_apple_runtime.sh

      - name: Locate certification artifact directory
        id: locate_artifacts
        if: always()
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          root = Path("artifacts/runtime-cert")
          artifact_dirs = sorted(path for path in root.glob("*") if path.is_dir())
          if not artifact_dirs:
              print("No certification artifact directory found.")
          else:
              latest = artifact_dirs[-1]
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
                handle.write(f"artifact_dir={latest.as_posix()}\n")
              print(f"Found certification artifact directory: {latest}")
          PY

      - name: Upload certification artifacts
        if: always() && steps.locate_artifacts.outputs.artifact_dir != ''
        uses: actions/upload-artifact@v4
        with:
          name: runtime-cert-${{ github.sha }}
          path: ${{ steps.locate_artifacts.outputs.artifact_dir }}
          retention-days: 90

      - name: Validate certification manifest
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          repo_contract_path = Path("turboquant/contract.json")
          repo_contract = json.loads(repo_contract_path.read_text(encoding="utf-8"))

          manifests = sorted(Path("artifacts/runtime-cert").glob("*/cert_manifest.json"))
          if len(manifests) != 1:
              raise SystemExit(
                  "expected exactly one cert_manifest.json under artifacts/runtime-cert/, "
                  f"found {len(manifests)}"
              )

          contracts = sorted(Path("artifacts/runtime-cert").glob("*/contract.json"))
          if len(contracts) != 1:
              raise SystemExit(
                  "expected exactly one contract.json under artifacts/runtime-cert/, "
                  f"found {len(contracts)}"
              )

          manifest_path = manifests[0]
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          contract_path = contracts[0]
          contract = json.loads(contract_path.read_text(encoding="utf-8"))
          artifact_dir = Path(manifest["artifact_dir"])
          if manifest.get("result") != "PASS":
              raise SystemExit(
                  f"certification manifest result must be PASS, got {manifest.get('result')!r}"
              )
          if manifest.get("platform") != "darwin-arm64":
              raise SystemExit(
                  f"certification manifest platform must be darwin-arm64, got {manifest.get('platform')!r}"
              )
          families = set(manifest.get("certification_scope", {}).get("families", []))
          if families != {"llama", "gemma"}:
              raise SystemExit(
                  "release certification manifest must include both 'llama' and 'gemma' in scope, "
                  f"got {sorted(families)!r}"
              )
          if contract != repo_contract:
              raise SystemExit(
                  f"artifact contract {contract_path} does not match repo contract {repo_contract_path}"
              )

          missing = [
              name
              for name in repo_contract["canonical_runtime"]["required_release_artifacts"]
              if not (artifact_dir / name).exists()
          ]
          if missing:
              raise SystemExit(
                  "release certification artifact directory is missing required files: "
                  + ", ".join(missing)
              )

          print(f"Validated certification manifest: {manifest_path}")
          print(f"Validated contract snapshot: {contract_path}")
          PY

  publish:
    needs: [verify-static, verify-vendored-surface, certify-apple-runtime]
    if: ${{ !contains(github.ref_name, '-rc') }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    environment: pypi
    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@v4
        with:
          name: turboquant-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
